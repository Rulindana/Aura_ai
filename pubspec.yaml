name: aura_ai
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.0                      # Ollama API calls
  pinput: ^5.0.0                    # PIN input UI
# Required for Linux Desktop support
  url_launcher: ^6.3.0 
  
  # Firebase (real authentication)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0
  
  # Storage for PIN (simpler version)
  shared_preferences: ^2.2.2        # Use this instead of flutter_secure_storage

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  

flutter:
  uses-material-design: true